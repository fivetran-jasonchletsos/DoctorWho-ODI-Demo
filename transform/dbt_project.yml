name: whoniverse
version: '1.0.0'
config-version: 2

profile: whoniverse

model-paths: ["models"]
test-paths:  ["tests"]
seed-paths:  ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  whoniverse:
    silver:
      +materialized: view
      +schema: silver
    gold:
      +materialized: dynamic_table
      +target_lag: '1 hour'
      +snowflake_warehouse: whoniverse_wh
      +schema: gold
